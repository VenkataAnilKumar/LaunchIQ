name: Scheduled Eval

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r src/apps/api/requirements.txt

      - name: Run full eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          python src/evals/regression/run_regression.py
          python src/evals/regression/update_baseline.py --if-improved

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-baseline
          path: src/evals/regression/baseline.json

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          text: "LaunchIQ scheduled eval failed."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
