  <circle cx="20" cy="19" r="2.2" fill="#ff8983" opacity="0.55"/>
  <circle cx="43" cy="21" r="6.5" fill="#febc2e"/>
  <circle cx="41" cy="19" r="2.2" fill="#ffd166" opacity="0.55"/>
  <circle cx="64" cy="21" r="6.5" fill="#28c840"/>
