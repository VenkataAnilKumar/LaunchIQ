  <title>LaunchIQ Demo — AI-Powered Product Launch Intelligence</title>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  Terminal chrome                                -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Window background -->
